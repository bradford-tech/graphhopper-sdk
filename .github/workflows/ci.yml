on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

name: ci

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run format -- --check

      - run: npm run lint

      - run: npm run type-check

      - run: npm run build

      - run: npm run generate && npm run fix

      - name: Check for generated output drift
        run: |
          if ! git diff --quiet src/client; then
            echo "::error::Generated SDK output is out of sync with spec. Run 'npm run generate && npm run fix' and commit."
            git diff --stat src/client
            exit 1
          fi

      - name: Pack SDK tarball
        run: npm pack

      - name: Install tarball in smoke test
        run: cd smoke-test && npm install ../bradford-tech-graphhopper-sdk-*.tgz

      - name: Smoke test (runtime)
        run: cd smoke-test && node test.mjs

      - name: Smoke test (types)
        run: cd smoke-test && npx tsc --noEmit
